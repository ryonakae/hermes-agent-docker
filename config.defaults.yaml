model:
  provider: openai-codex
  model: gpt-5.4

approvals:
  mode: smart

auxiliary:
  vision:
    provider: codex
    model: gpt-5.4-mini
  web_extract:
    provider: codex
    model: gpt-5.4-mini
  compression:
    provider: codex
    model: gpt-5.4-mini
  session_search:
    provider: codex
    model: gpt-5.4-mini
  skills_hub:
    provider: codex
    model: gpt-5.4-mini
  approval:
    provider: codex
    model: gpt-5.4-mini
  mcp:
    provider: codex
    model: gpt-5.4-mini
  flush_memories:
    provider: codex
    model: gpt-5.4-mini

terminal:
  backend: local
  timeout: 180

platforms:
  slack:
    require_mention: true
    reply_to_mode: first
    extra:
      reply_in_thread: true
      reply_broadcast: false

display:
  tool_progress: all

memory:
  memory_enabled: true
  user_profile_enabled: true
  provider: holographic
  holographic:
    auto_extract: true
    default_trust: 0.5

compression:
  enabled: true
  threshold: 0.50
