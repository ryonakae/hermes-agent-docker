model:
  provider: openrouter
  default: google/gemma-4-31b-it
  base_url: https://openrouter.ai/api/v1
  api_mode: chat_completions

approvals:
  mode: smart

auxiliary:
  vision:
    provider: openrouter
    model: qwen/qwen3.5-flash-02-23
  web_extract:
    provider: openrouter
    model: qwen/qwen3.5-flash-02-23
  compression:
    provider: openrouter
    model: qwen/qwen3.5-flash-02-23
  session_search:
    provider: openrouter
    model: qwen/qwen3.5-flash-02-23
  skills_hub:
    provider: openrouter
    model: qwen/qwen3.5-flash-02-23
  approval:
    provider: openrouter
    model: qwen/qwen3.5-flash-02-23
  mcp:
    provider: openrouter
    model: qwen/qwen3.5-flash-02-23
  flush_memories:
    provider: openrouter
    model: qwen/qwen3.5-flash-02-23
  title_generation:
    provider: openrouter
    model: qwen/qwen3.5-flash-02-23

terminal:
  backend: local
  timeout: 180

platforms:
  slack:
    require_mention: true
    reply_to_mode: first
    extra:
      reply_in_thread: true
      reply_broadcast: false

display:
  tool_progress: all

memory:
  memory_enabled: true
  user_profile_enabled: true
  provider: hindsight

compression:
  enabled: true
  threshold: 0.50
