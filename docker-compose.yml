services:
  hermes:
    build: .
    container_name: hermes
    init: true
    stdin_open: true
    tty: true
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/custom-entrypoint.sh"]
    command: ["gateway", "run"]
    ports:
      - "127.0.0.1:8642:8642"
    environment:
      TZ: Asia/Tokyo
      HINDSIGHT_MODE: local_external
      HINDSIGHT_API_URL: http://hindsight:8888
      HERMES_DATA_DIR: /opt/data
    depends_on:
      hindsight:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8642/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    shm_size: 1g
    volumes:
      - ./hermes-data:/opt/data
      # ホスト側コーディングエージェントの transcript（read-only）
      - ~/.claude/projects:/home/hermes/.claude/projects:ro
      - ~/.codex/sessions:/home/hermes/.codex/sessions:ro
      - ~/.gemini/tmp:/home/hermes/.gemini/tmp:ro
      - ~/.local/share/opencode:/home/hermes/.local/share/opencode:ro
    networks:
      - hermes-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    container_name: hindsight
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:9999:9999"
    env_file:
      - ./hermes-data/hindsight/.env
    environment:
      HINDSIGHT_API_DB_POOL_MAX_SIZE: "30"
      HINDSIGHT_API_WORKER_MAX_SLOTS: "8"
      HINDSIGHT_API_LLM_MAX_CONCURRENT: "16"
    volumes:
      - ./hermes-data/hindsight/data:/home/hindsight/.pg0
      - ./hermes-data/hindsight/codex-auth:/home/hindsight/.codex
    networks:
      - hermes-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 4G

  dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    entrypoint: ["/opt/hermes/docker/entrypoint.sh"]
    command: ["dashboard", "--host", "0.0.0.0", "--insecure", "--no-open"]
    ports:
      - "127.0.0.1:9119:9119"
    volumes:
      - ./hermes-data:/opt/data
    environment:
      GATEWAY_HEALTH_URL: http://hermes:8642
    networks:
      - hermes-net
    depends_on:
      - hermes
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"


networks:
  hermes-net:
    driver: bridge
