services:
  hermes:
    build: .
    container_name: hermes
    init: true
    stdin_open: true
    tty: true
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/custom-entrypoint.sh"]
    command: ["gateway", "run"]
    ports:
      - "127.0.0.1:8642:8642"
    env_file: .env
    environment:
      CLOUDSDK_CONFIG: /opt/data/tools/gcloud/config
      GOOGLE_WORKSPACE_CLI_CONFIG_DIR: /opt/data/tools/gws/config
      GOOGLE_WORKSPACE_CLI_KEYRING_BACKEND: file
      PLAYWRIGHT_BROWSERS_PATH: /opt/data/tools/agent-browser/browsers
      UV_CACHE_DIR: /opt/data/tools/cache/uv
      UV_TOOL_DIR: /opt/data/tools/uv/tools
      UV_TOOL_BIN_DIR: /opt/data/tools/uv/bin
      UV_PYTHON_INSTALL_DIR: /opt/data/tools/uv/python
      UV_PYTHON_BIN_DIR: /opt/data/tools/uv/bin
      UV_PYTHON_INSTALL_BIN: "1"
      PATH: /opt/data/tools/uv/bin:/opt/data/tools/gcloud/sdk/bin:/opt/data/tools/gws/install/bin:/opt/data/tools/agent-browser/install/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8642"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    volumes:
      - ./hermes-data:/opt/data
    networks:
      - hermes-net
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  dashboard:
    build: .
    container_name: hermes-dashboard
    restart: unless-stopped
    entrypoint: ["hermes"]
    command: ["dashboard", "--host", "0.0.0.0"]
    ports:
      - "127.0.0.1:9119:9119"
    volumes:
      - ./hermes-data:/opt/data
    environment:
      GATEWAY_HEALTH_URL: http://hermes:8642
    networks:
      - hermes-net
    depends_on:
      - hermes
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

networks:
  hermes-net:
    driver: bridge
